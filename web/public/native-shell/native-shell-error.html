<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>AthletixOS</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 24px;
        padding-top: max(24px, env(safe-area-inset-top));
        padding-bottom: max(24px, env(safe-area-inset-bottom));
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
        background: #1f1f23;
        color: #ffffff;
        text-align: center;
        -webkit-user-select: none;
        user-select: none;
      }
      main { max-width: 320px; width: 100%; }
      /* Reconnecting badge — bumped from 72px to 128px so the brand mark
         actually reads on a phone. Border-radius:50% lets the source
         circle blend with the dark page background without a visible
         square edge. */
      .logo {
        width: 128px; height: 128px;
        border-radius: 50%;
        margin: 0 auto 24px;
        display: block;
      }
      h1 {
        font-size: 20px;
        font-weight: 600;
        margin: 0 0 8px;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0 0 24px;
        color: rgba(255, 255, 255, 0.65);
        line-height: 1.5;
        font-size: 14px;
      }
      .spinner {
        width: 28px; height: 28px;
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
        margin: 0 auto 20px;
      }
      .spinner.hidden { display: none; }
      @keyframes spin { to { transform: rotate(360deg); } }
      button {
        appearance: none;
        -webkit-appearance: none;
        background: #ffffff;
        color: #1f1f23;
        border: none;
        border-radius: 10px;
        padding: 12px 24px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        min-width: 140px;
        font-family: inherit;
        transition: opacity 0.15s;
      }
      button:active { opacity: 0.7; }
      button.hidden { display: none; }
      .status {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.4);
        margin-top: 16px;
        min-height: 16px;
      }
    </style>
    <!-- Build-time-injected window.NATIVE_SERVER_URL. Generated by
         scripts/native-shell-config.mjs (runs as part of `npm run cap:sync`)
         from CAPACITOR_SERVER_URL || NEXT_PUBLIC_APP_URL, so dev simulators
         and production builds both retry against the right origin. -->
    <script src="server-config.js"></script>
  </head>
  <body>
    <main>
      <img class="logo" src="icon.png" alt="" />
      <div id="spinner" class="spinner"></div>
      <h1 id="heading">Reconnecting…</h1>
      <p id="message">Just a moment while we get you back online.</p>
      <button id="reload-btn" class="hidden" type="button">Try again</button>
      <div id="status" class="status"></div>
    </main>
    <script>
      (function () {
        // Resolved at build time by scripts/native-shell-config.mjs. The
        // hardcoded fallback only fires if server-config.js failed to load
        // (e.g. shipped bundle missing it), in which case dev-default keeps
        // the simulator working.
        var SERVER_URL = (
          typeof window.NATIVE_SERVER_URL === "string" && window.NATIVE_SERVER_URL
        ) || "http://127.0.0.1:3000";
        SERVER_URL = SERVER_URL.replace(/\/$/, "");

        var AUTO_RETRY_MS = 2000;          // wait before the first retry
        var GIVE_UP_AFTER_ATTEMPTS = 4;    // then show the "Try again" button

        var spinner = document.getElementById("spinner");
        var heading = document.getElementById("heading");
        var message = document.getElementById("message");
        var btn     = document.getElementById("reload-btn");
        var status  = document.getElementById("status");

        // Track attempts across page reloads. WKWebView restricts
        // localStorage on file:// in some versions, so fall back to a
        // simple in-memory counter if storage isn't available.
        var STORAGE_KEY = "athletixos.nshell.attempts";
        function readAttempts() {
          try { return Number(sessionStorage.getItem(STORAGE_KEY) || "0"); }
          catch (_) { return 0; }
        }
        function writeAttempts(n) {
          try { sessionStorage.setItem(STORAGE_KEY, String(n)); } catch (_) {}
        }
        function resetAttempts() {
          try { sessionStorage.removeItem(STORAGE_KEY); } catch (_) {}
        }

        function showGiveUp() {
          spinner.classList.add("hidden");
          heading.textContent = "Can’t reach AthletixOS";
          message.textContent =
            "We couldn't connect to the server. Check your connection, then try again.";
          btn.classList.remove("hidden");
        }

        function tryNavigate() {
          var n = readAttempts() + 1;
          writeAttempts(n);
          status.textContent = "Attempt " + n;
          // Retry against the native start path, NOT "/". The marketing
          // landing page lives at "/", and any failed WebView nav would
          // otherwise silently send the user there after a reconnect.
          // /member is the native entry; middleware reroutes to /login or
          // /dashboard from there based on the session.
          window.location.replace(SERVER_URL + "/member");
        }

        // On load: decide whether to auto-retry or show the manual fallback.
        var attempts = readAttempts();
        if (attempts >= GIVE_UP_AFTER_ATTEMPTS) {
          showGiveUp();
        } else {
          status.textContent = attempts > 0 ? "Attempt " + attempts : "";
          setTimeout(tryNavigate, AUTO_RETRY_MS);
        }

        btn.addEventListener("click", function () {
          resetAttempts();
          spinner.classList.remove("hidden");
          heading.textContent = "Reconnecting…";
          message.textContent = "Just a moment while we get you back online.";
          btn.classList.add("hidden");
          tryNavigate();
        });
      })();
    </script>
  </body>
</html>
