<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>AthletixOS</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1f1f23;
        color: #ffffff;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
      }
      main {
        max-width: 320px;
      }
      img {
        width: 88px;
        height: 88px;
        border-radius: 22px;
        margin-bottom: 18px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: #d1d5db;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="icon.png" alt="" />
      <h1>AthletixOS</h1>
      <p>Loading the member portal...</p>
    </main>
  </body>
</html>
